seed: 42

# Models are instantiated using skrl's model instantiator utility
# https://skrl.readthedocs.io/en/latest/api/utils/model_instantiators.html
models:
  separate: True
  policy:  # Actor network
    class: GaussianMixin
    clip_actions: True
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [128, 128, 128]
        activations: elu
    output: ACTIONS
  
  critic_1: # First Q-Network
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES_ACTIONS  # SAC critics take both states and actions as input
        layers: [128, 128, 128]
        activations: elu
    output: ONE
    
  critic_2: # Twin Q-Network (prevents overestimation bias)
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [128, 128, 128]
        activations: elu
    output: ONE
    
  target_critic_1:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [128, 128, 128]
        activations: elu
    output: ONE
    
  target_critic_2:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [128, 128, 128]
        activations: elu
    output: ONE

# Replay memory
# SAC is off-policy, so it needs a massive fixed-size replay buffer, not a dynamic rollout buffer
memory:
  class: RandomMemory
  memory_size: -1 

# SAC agent configuration
# https://skrl.readthedocs.io/en/latest/api/agents/sac.html
agent:
  class: SAC
  gradient_steps: 1
  batch_size: 64            # Increased significantly for vectorized Isaac Lab environments
  discount_factor: 0.99
  polyak: 0.005
  actor_learning_rate: 5.0e-04
  critic_learning_rate: 5.0e-04
  learning_rate_scheduler: None # Removed KLAdaptiveLR (KL divergence stopping is a PPO concept)
  learning_rate_scheduler_kwargs: {}
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs:
    size: OBSERVATIONS
  rollouts: 1
  random_timesteps: 0      # Fills the buffer with random exploration before learning starts
  learning_starts: 100
  grad_norm_clip: 0.0
  learn_entropy: True
  entropy_learning_rate: 5.0e-03
  initial_entropy_value: 1
  target_entropy: -12
  rewards_shaper: None
  mixed_precision: False
  
  # logging and checkpoint
  experiment:
    directory: "unitree_a1_flat"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: 0
    wandb: True
    wandb_kwargs:
      project: "skrl_sac"     
      name: "sac_a1_flat"        
      save_code: True 

# Sequential trainer
# https://skrl.readthedocs.io/en/latest/api/trainers/sequential.html
trainer:
  class: SequentialTrainer
  timesteps: 60000
  environment_info: log